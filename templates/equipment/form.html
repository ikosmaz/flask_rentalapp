{% extends 'base.html' %}

{% block content %}
<h1 class="h3 mb-3">{{ 'Edit equipment' if record else 'Add equipment' }}</h1>

<form method="post" class="row g-3">
  <div class="col-12 col-md-3">
    <label class="form-label">Model ID</label>
    <input class="form-control" type="number" name="model_id" value="{{ record.model_id if record else '' }}" {{ 'readonly' if record else 'required' }}>
  </div>
  <div class="col-12 col-md-3">
    <label class="form-label">Type</label>
    <input class="form-control" name="type" value="{{ record.type if record else '' }}" required>
  </div>
  <div class="col-12 col-md-3">
    <label class="form-label">Brand</label>
    <input class="form-control" name="brand" value="{{ record.brand if record else '' }}" required>
  </div>
  <div class="col-12 col-md-3">
    <label class="form-label">Model</label>
    <input class="form-control" name="model" value="{{ record.model if record else '' }}" required>
  </div>

  <div class="col-12">
    <label class="form-label">Description</label>
    <textarea class="form-control" name="description" rows="3">{{ record.description if record and record.description else '' }}</textarea>
  </div>

  <div class="col-12 col-md-3">
    <label class="form-label">Daily price</label>
    <input class="form-control" type="number" step="0.01" name="daily_price" value="{{ record.daily_price if record else '' }}" required>
  </div>
  <div class="col-12 col-md-3">
    <label class="form-label">Total quantity</label>
    <input class="form-control" type="number" name="total_quantity" value="{{ record.total_quantity if record else '' }}" required>
  </div>
  <div class="col-12 col-md-3">
    <label class="form-label">Quantity in stock</label>
    <input class="form-control" type="number" name="quantity_in_stock" value="{{ record.quantity_in_stock if record else 0 }}" required>
  </div>
  <div class="col-12 col-md-3">
    <label class="form-label">Category</label>
    <select class="form-select" name="equipment_category_id" required>
      {% for c in categories %}
      <option value="{{ c.category_id }}" {% if record and c.category_id == record.equipment_category_id %}selected{% endif %}>{{ c.category }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="col-12">
    <button class="btn btn-primary" type="submit">Save</button>
    <a href="{{ url_for('equipment.list_equipment') }}" class="btn btn-outline-secondary">Cancel</a>
  </div>
</form>
{% endblock %}
